# Helix Keymap Configuration
# Custom keybindings for quit and force quit in space mode

[keys.normal]
# Space mode keybindings
"space" = { q = "quit", Q = "force_quit" }

# Alternative: Direct keybindings (if space mode conflicts)
# "ctrl q" = "quit"
# "ctrl Q" = "force_quit"

# Additional useful bindings
"space" = { w = "write", W = "write_all", c = "command_palette" }

[keys.insert]
# Insert mode bindings
"ctrl q" = "quit"
"ctrl Q" = "force_quit"

[keys.select]
# Select mode bindings
"space" = { q = "quit", Q = "force_quit" }
