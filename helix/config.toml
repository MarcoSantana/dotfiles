theme = "gruvbox_dark_soft"

[editor]
line-number = "relative"
cursorline = true
color-modes = true
idle-timeout = 50 # Makes "which-key" menus pop up instantly
cursor-shape.insert = "bar"
cursor-shape.normal = "block"
cursor-shape.select = "underline"
indent-guides.render = true
lsp.display-messages = true
lsp.display-inlay-hints = true
bufferline = "multiple"
soft-wrap.enable = true

[editor.statusline]
left = ["mode", "spacer", "spinner", "spacer", "file-name", "spacer", "file-modification-indicator"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[keys.normal]
# Quick escape
esc = ["collapse_selection", "keep_primary_selection"]

# Typst Preview (Assuming typst-preview or just opening the pdf)
"g" = { "p" = ":sh typst compile % && xdg-open %:r.pdf" }

# File buffer management
"A-s" = ":write"
"A-q" = ":buffer-close"
"A-a" = "%"
"A-S" = ":write-as"

[keys.insert]
# Emacs-like insert mode move
"C-f" = "move_char_right"
"C-b" = "move_char_left"
"C-p" = "move_line_up"
"C-n" = "move_line_down"
"C-a" = "goto_line_start"
"C-e" = "goto_line_end_newline"
"C-k" = "kill_to_line_end"
"C-w" = "delete_word_backward"
"C-u" = "kill_to_line_start"
