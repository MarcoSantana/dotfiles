general {
  no_fade_in = false
  no_fade_out = false
  grace = 0
  disable_loading_bar = true
}

background {
  path = ~/dotfiles/assets/wallpaper.png
  blur_size = 6
  blur_passes = 3
  brightness = 0.7
}

input-field {
  monitor =
  size = 300, 50
  outline_thickness = 2
  dots_size = 0.33
  dots_spacing = 0.15
  dots_center = true
  outer_color = rgba(6272a4ee)
  inner_color = rgba(282a36ee)
  font_color = rgba(f8f8f2ee)
  fade_on_empty = true
  placeholder_text = <i>Password...</i>
  hide_input = false
  check_color = rgba(50fa7bee)
  fail_color = rgba(ff5555ee)
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = rgba(ffb86cee)
  position = 0, -80
  halign = center
  valign = center
}

# Clock
label {
  monitor =
  text = cmd[update:1000] echo "$(date +'%H:%M')"
  color = rgba(f8f8f2ee)
  font_size = 72
  font_family = JetBrains Mono Nerd Font
  position = 0, 40
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:86400000] echo "$(date +'%A, %B %d')"
  color = rgba(6272a4ee)
  font_size = 18
  font_family = JetBrains Mono Nerd Font
  position = 0, -20
  halign = center
  valign = center
}
