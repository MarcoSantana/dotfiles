# ═══════════════════════════════════════════════
#  Hyprland Config — Tokyo Night
# ═══════════════════════════════════════════════

$border_active   = rgba(7aa2f7ee)
$border_inactive = rgba(3b4261ee)

# ── Monitor ────────────────────────────────────
monitor=,preferred,auto,1

# ── Execute at startup ─────────────────────────
exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprpaper
exec-once = hypridle
exec-once = xdg-settings set default-web-browser app.zen_browser.zen.desktop

# ── Environment ────────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = GTK_THEME,Adwaita-dark
env = QT_QPA_PLATFORMTHEME,qt5ct
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_WEBRENDER,1
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_DRM_NO_MODIFIERS,1
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# ── Cursor ─────────────────────────────────────
cursor {
  inactive_timeout = 3
  no_hardware_cursors = true
  enable_hyprcursor = false
}

# ── Input ──────────────────────────────────────
input {
  kb_layout = us,es
  kb_options = grp:alt_shift_toggle,caps:ctrl_modifier,compose:ralt
  repeat_rate = 50
  repeat_delay = 300
  follow_mouse = 1
  touchpad {
    natural_scroll = true
    disable_while_typing = true
  }
  sensitivity = 0
}

# ... (rest of the file remains the same, but I need to include the new bindings)


# ── General ────────────────────────────────────
general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
  col.active_border = $border_active
  col.inactive_border = $border_inactive
  layout = dwindle
}

# ── Decoration ─────────────────────────────────
decoration {
  rounding = 8
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0
  blur {
    enabled = true
    size = 6
    passes = 3
    ignore_opacity = true
    new_optimizations = on
    noise = 0.0
    contrast = 1.0
    brightness = 1.0
    popups = true
    popups_ignorealpha = 0.2
  }
  shadow {
    enabled = true
    range = 8
    render_power = 3
    color = rgba(1a1a2eee)
  }
}

# ── Animations ─────────────────────────────────
animations {
  enabled = true
  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.0, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = linear, 0.0, 0.0, 1.0, 1.0
  animation = windows, 1, 6, wind, slide
  animation = windowsIn, 1, 6, winIn, slide
  animation = windowsOut, 1, 5, winOut, slide
  animation = windowsMove, 1, 5, wind, slide
  animation = border, 1, 5, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 7, default
  animation = workspaces, 1, 6, wind, slidevert
}

# ── Layout ─────────────────────────────────────
dwindle {
  preserve_split = true
  force_split = 0
  split_width_multiplier = 1.0
  smart_split = false
  smart_resizing = true
}

# ── Window rules ───────────────────────────────
windowrule = float 1, match:class pavucontrol
windowrule = float 1, match:class blueman-manager
windowrule = float 1, match:class nm-connection-editor
windowrule = float 1, match:class org.gnome.Nautilus
windowrule = float 1, match:title ^(File Operation Progress)$
windowrule = center 1, match:class pavucontrol
windowrule = center 1, match:class nm-connection-editor

# ── Keybindings ────────────────────────────────
$mod = SUPER

# Terminal
bind = $mod, Return, exec, ghostty

# App launcher
bind = $mod, Space, exec, wofi --show drun

# Cycle / switch windows with wofi
bind = $mod, Tab, exec, wofi --show window

# List all open windows
bind = $mod, W, exec, wofi --show window

# Kill active window
bind = $mod, Q, killactive

# Focus (vim keys)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Move window
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Resize window
bind = $mod CTRL, H, resizeactive, -50 0
bind = $mod CTRL, L, resizeactive, 50 0
bind = $mod CTRL, K, resizeactive, 0 -50
bind = $mod CTRL, J, resizeactive, 0 50

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Applications (matching eww widget keybinds)
bind = $mod, B, exec, flatpak run app.zen_browser.zen                     # Zen Browser
bind = $mod SHIFT, B, exec, flatpak run org.chromium.Chromium                 # Chromium
bind = $mod, F, exec, thunar                           # Files
bind = $mod SHIFT, F, exec, ghostty -e ranger          # Ranger
bind = $mod, E, exec, emacsclient -c                   # Emacs
bind = $mod, G, exec, ghostty -e lazygit               # Lazygit
bind = $mod, P, exec, ghostty -e btop                  # Btop
bind = $mod SHIFT, P, exec, grimblast save screen      # Screenshot
bind = $mod, V, exec, pavucontrol                      # Audio
bind = $mod, T, exec, ghostty -e btm                   # Bottom
bind = $mod SHIFT, D, exec, insomnia                   # Insomnia

# Toggle floating
bind = $mod, S, togglefloating

# Fullscreen
bind = $mod, M, fullscreen

# Eww widgets
bind = $mod, D, exec, eww toggle dashboard
bind = $mod, F1, exec, eww open keybinds_widget

# Clipboard
bind = $mod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Screenshot region
bind = , PRINT, exec, grimblast copy area
bind = $mod SHIFT, S, exec, grimblast copy area && swappy -f -

# Lock screen
bind = $mod SHIFT, L, exec, hyprlock

# Waybar toggle
bind = $mod SHIFT, W, exec, pkill -SIGUSR1 waybar

# Theme switcher
bind = $mod SHIFT, T, exec, theme-switch next

# Multimedia keys
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindl = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Gestures ───────────────────────────────────
gestures {
  workspace_swipe_distance = 300
  workspace_swipe_invert = true
  gesture = 3, horizontal, workspace
}

# ── Session────────────────────────────────────────
bind = $mainMod SHIFT, M, exit,
# bind = $mainMod SHIFT, M, exit,
# ── Misc ────────────────────────────────────────
misc {
  disable_autoreload = false
  disable_hyprland_logo = true
  enable_swallow = true
  swallow_regex = ^(ghostty)$
  focus_on_activate = true
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
  vrr = 0
}
